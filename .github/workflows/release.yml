name: Build macOS

# Only the macOS build lives in CI — Linux and Windows are built locally
# and uploaded manually to the release. macOS can't be cross-compiled
# from Linux (CGO + Apple SDK), so this runner is the only one we need.
#
# Workflow:
#   1. Build Linux + Windows locally.
#   2. Push a v* tag — this action builds macOS and uploads the artifact.
#   3. Download the macOS artifact, then `gh release create` with all three.
#
# Triggered on tag push. Does NOT publish a release — that's done manually
# so everything lands in one atomic release creation.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    name: Build (macOS — universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build universal binary
        run: wails build -platform darwin/universal -o genetica-resolutio-macos

      - name: Package .app
        run: |
          cd build/bin
          ditto -c -k --keepParent \
            "Genetica Resolutio.app" \
            genetica-resolutio-macos-universal.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/bin/genetica-resolutio-macos-universal.zip
          retention-days: 30
