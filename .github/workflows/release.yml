name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 'stable' always fetches the latest patch release so shipped
          # binaries pick up stdlib security fixes automatically.
          go-version: 'stable'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -tags webkit2_41 -o genetica-resolutio-linux-amd64

      - name: Compress
        run: |
          cd build/bin
          tar -czf genetica-resolutio-linux-amd64.tar.gz genetica-resolutio-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/bin/genetica-resolutio-linux-amd64.tar.gz

  build-macos:
    name: Build (macOS)
    # macos-latest is Apple Silicon; we produce a universal binary that
    # runs natively on both Intel and ARM Macs so there's only one artifact.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 'stable' always fetches the latest patch release so shipped
          # binaries pick up stdlib security fixes automatically.
          go-version: 'stable'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (Universal)
        run: wails build -platform darwin/universal -o genetica-resolutio-macos

      - name: Package app
        # Wails always names the .app bundle after productName in wails.json
        # ("Genetica Resolutio.app"), regardless of the -o binary-name flag.
        run: |
          cd build/bin
          ditto -c -k --keepParent \
            "Genetica Resolutio.app" \
            genetica-resolutio-macos-universal.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/bin/genetica-resolutio-macos-universal.zip

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 'stable' always fetches the latest patch release so shipped
          # binaries pick up stdlib security fixes automatically.
          go-version: 'stable'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -o genetica-resolutio-windows-amd64.exe

      - name: Compress
        run: |
          cd build/bin
          Compress-Archive -Path genetica-resolutio-windows-amd64.exe -DestinationPath genetica-resolutio-windows-amd64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/genetica-resolutio-windows-amd64.zip

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -o -name "*.zip" | sort | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Genetica Resolutio ${{ github.ref_name }}
          body: |
            ## Downloads

            | Platform | File |
            |---|---|
            | Linux (x86-64) | `genetica-resolutio-linux-amd64.tar.gz` |
            | macOS (Universal — Intel + Apple Silicon) | `genetica-resolutio-macos-universal.zip` |
            | Windows | `genetica-resolutio-windows-amd64.zip` |

            See `SHA256SUMS.txt` to verify your download.

            > **Note:** This app is open source and unsigned. Your OS may show a security warning on first launch.
            > - **macOS**: Right-click the app → Open, then click Open in the dialog. Or: System Settings → Privacy & Security → Open Anyway.
            > - **Windows**: Click "More info" → "Run anyway" in the SmartScreen prompt.
            > - **Linux**: `chmod +x genetica-resolutio-linux-amd64 && ./genetica-resolutio-linux-amd64`

            ### Build from source
            See the [build instructions](https://github.com/${{ github.repository }}/blob/main/docs/building-from-source.md) if you prefer to compile it yourself.
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: false
